services:
  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: localwala_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: localwala
      POSTGRES_PASSWORD: localwala123
      POSTGRES_DB: localwala_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localwala"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: localwala_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./localwala-backend
      dockerfile: Dockerfile
    container_name: localwala_backend
    restart: unless-stopped
    env_file: .env                  # ← DATABASE_URL comes from here
    environment:                    # ← only non-sensitive overrides here
      DATABASE_URL: postgresql+asyncpg://localwala:localwala123@postgres:5432/localwala_db
      REDIS_URL:    redis://redis:6379
      CORS_ORIGINS: "http://localhost:3000,http://frontend:3000,http://localhost:8080"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./localwala-frontend
      dockerfile: Dockerfile
    container_name: localwala_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL:  http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_NAME: LocalWala
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: localwala_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data: