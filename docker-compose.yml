services:
  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: localwala_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./localwala-backend
      dockerfile: Dockerfile
    container_name: localwala_backend
    restart: unless-stopped
    env_file: .env                  # ← DATABASE_URL comes from here
    environment:                    # ← only non-sensitive overrides here
      REDIS_URL:    redis://redis:6379
      CORS_ORIGINS: "http://localhost:3000,http://frontend:3000,http://localhost"
    volumes:
      - ./localwala-backend:/app
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./localwala-frontend
      dockerfile: Dockerfile
    container_name: localwala_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL:  http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_NAME: LocalWala
    volumes:
      - ./localwala-frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: localwala_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend